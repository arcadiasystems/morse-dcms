# https://taskfile.dev

version: '3'

tasks:
  build:
    desc: "Compile the Move package. ⚠️ Must be on 'testnet' or 'mainnet' — does not work on 'localnet'."
    cmds:
      - sui move build
  test:
    desc: "Run Move unit tests. ⚠️ Must be on 'testnet' or 'mainnet' — does not work on 'localnet'."
    cmds:
      - sui move test
  publish:
    desc: "Publish the package to the active environment and update Published.toml."
    cmds:
      - sui client publish
  upgrade:
    desc: "Upgrade the published package on the active environment."
    cmds:
      - sui client upgrade
  localnet:
    desc: "Start local Sui node with fresh genesis."
    cmds:
      - RUST_LOG="off,sui_node=info" sui start --with-faucet --force-regenesis
  faucet:
    desc: Request SUI from the local faucet (run after localnet is up)
    cmds:
      - sui client faucet
  publish:local:
    desc: Publish ephemerally to localnet (does not update Published.toml but creates a Pub.local.toml with the new package ID)
    cmds:
      - task switch:local
      - sui client test-publish --build-env testnet # build env is testnet because that's the target we are compiling for, but we are publishing to localnet
  switch:local:
    desc: Switch active Sui environment to localnet
    cmds:
      - sui client switch --env local
  switch:testnet:
    desc: Switch active Sui environment to testnet
    cmds:
      - sui client switch --env testnet
  update-sui:
    desc: "Update the Sui CLI to the latest version."
    cmds:
      - suiup update sui
  update-suiup:
    desc: "Update the suiup toolchain manager itself."
    cmds:
      - suiup self update
  clean:
    desc: "Delete the ephemeral Pub.local.toml created by publish:local."
    cmds:
      - rm Pub.local.toml
