# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true
  build:
    cmds:
      - sui move build
  test:
    cmds:
      - sui move test
  publish:
    cmds:
      - sui client publish
  upgrade:
    cmds:
      - sui client upgrade
  update-sui:
    cmds:
      - suiup update sui
  update-suiup:
    cmds:
      - suiup self update
